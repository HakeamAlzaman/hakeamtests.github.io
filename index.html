<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <title>نظام التتبع المتقدم</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            margin: 0; 
            padding: 0; 
            background: #000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Top Information Bar - Horizontal */
        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: 2px solid #00b894;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        #top-bar .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #00b894;
            font-size: 18px;
            font-weight: bold;
        }

        #top-bar .info-section {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-size: 14px;
            background: rgba(255,255,255,0.05);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .info-item .label {
            color: #888;
            font-size: 12px;
        }

        .info-item .value {
            color: #fff;
            font-weight: bold;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-red { background: #ff4757; box-shadow: 0 0 8px #ff4757; }
        .dot-green { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .dot-yellow { background: #ffa502; box-shadow: 0 0 8px #ffa502; }

        #btn-start {
            background: linear-gradient(135deg, #00b894 0%, #00a085 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            white-space: nowrap;
        }
        #btn-start:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(0,184,148,0.4); 
        }
        #btn-start:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        /* Map Container */
        #map-container {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
        }

        #map { 
            height: 100%; 
            width: 100%; 
        }

        /* Sandbox Warning Banner */
        #sandbox-warning {
            display: none;
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: white;
            padding: 10px 20px;
            z-index: 999;
            text-align: center;
            font-size: 13px;
        }
        #sandbox-warning a {
            color: #fff;
            text-decoration: underline;
            font-weight: bold;
            margin: 0 10px;
        }

        /* Error Log Panel */
        #log-panel {
            position: fixed;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.9);
            color: #00ff88;
            padding: 12px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 11px;
            max-width: 400px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            border: 1px solid #333;
            display: none;
        }
        #log-panel.visible { display: block; }
        .log-entry { margin: 3px 0; padding: 4px 8px; border-radius: 4px; }
        .log-error { color: #ff6b6b; background: rgba(255,0,0,0.1); }
        .log-warn { color: #ffa502; background: rgba(255,165,0,0.1); }
        .log-info { color: #00ff88; background: rgba(0,255,0,0.05); }

        /* Alert Modal */
        #backdrop {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1999;
            backdrop-filter: blur(8px);
        }
        .region-alert {
            display: none;
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 35px 45px;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.6);
            z-index: 2000;
            text-align: center;
            min-width: 320px;
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            color: white;
        }
        .region-alert.region1 { background: linear-gradient(135deg, #ff5252 0%, #ff3838 100%); }
        .region-alert.region2 { background: linear-gradient(135deg, #0f9D58 0%, #0a8f4c 100%); }
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            70% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .region-alert h2 { margin: 0 0 15px 0; font-size: 26px; }
        .region-alert .region-name { font-size: 32px; font-weight: bold; margin: 10px 0; display: block; }
        .region-alert .region-icon { font-size: 60px; margin-bottom: 20px; }
        .close-btn {
            margin-top: 25px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.6);
            color: white;
            padding: 12px 35px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .close-btn:hover { background: white; color: #333; }

        /* Responsive */
        @media (max-width: 768px) {
            #top-bar { 
                height: auto; 
                flex-direction: column; 
                padding: 10px;
                gap: 10px;
            }
            #top-bar .info-section {
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }
            .info-item { font-size: 12px; padding: 6px 10px; }
            #map-container { top: auto; }
        }
    </style>
<base target="_blank">
</head>
<body>

<!-- Top Information Bar -->
<div id="top-bar">
    <div class="logo">
        <span>📍</span>
        <span>نظام التتبع المتقدم</span>
    </div>

    <div class="info-section">
        <div class="info-item">
            <span class="label">📡 حالة التتبع:</span>
            <span class="value" id="gps-status">غير متصل</span>
            <span class="status-dot dot-red" id="gps-dot"></span>
        </div>

        <div class="info-item">
            <span class="label">🎯 المنطقة:</span>
            <span class="value" id="zone-check">---</span>
        </div>

        <div class="info-item">
            <span class="label">📊 الدقة:</span>
            <span class="value" id="accuracy">---</span>
        </div>

        <div class="info-item">
            <span class="label">🔒 البيئة:</span>
            <span class="value" id="env-check">---</span>
        </div>

        <button id="btn-start">📡 تفعيل التتبع</button>
    </div>
</div>

<!-- Sandbox Warning -->
<div id="sandbox-warning">
    ⚠️ الموقع في إطار محصور - قد لا يعمل نظام تحديد المواقع. 
    <a href="#" id="open-direct" target="_blank">🔗 فتح مباشرة</a>
</div>

<!-- Alert Modals -->
<div id="backdrop"></div>

<div id="alert-region1" class="region-alert region1">
    <div class="region-icon">🎯</div>
    <h2>مرحباً!</h2>
    <p>أنت الآن داخل<br><span class="region-name">المربع الأول</span></p>
    <button class="close-btn" onclick="closeAlert('alert-region1')">حسناً</button>
</div>

<div id="alert-region2" class="region-alert region2">
    <div class="region-icon">🎯</div>
    <h2>مرحباً!</h2>
    <p>أنت الآن داخل<br><span class="region-name">المربع الثاني</span></p>
    <button class="close-btn" onclick="closeAlert('alert-region2')">حسناً</button>
</div>

<!-- Log Panel -->
<div id="log-panel">
    <div style="border-bottom:1px solid #333; margin-bottom:8px; padding-bottom:4px; color:#fff; font-weight:bold;">📝 سجل الأحداث</div>
    <div id="log-content"></div>
</div>

<!-- Map -->
<div id="map-container">
    <div id="map"></div>
</div>

<script>
    // Logging system
    const logs = [];
    function log(type, msg) {
        const time = new Date().toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        logs.push({time, type, msg});
        const div = document.createElement('div');
        div.className = `log-entry log-${type}`;
        div.textContent = `${time} [${type.toUpperCase()}] ${msg}`;
        document.getElementById('log-content').appendChild(div);
        console.log(`[${type}] ${msg}`);
    }

    // Detect environment
    function detectEnv() {
        log('info', 'فحص البيئة...');

        const inIframe = window !== window.top;
        const protocol = window.location.protocol;
        const secure = window.isSecureContext;
        let sandboxed = false;

        try {
            if (window.frameElement && window.frameElement.hasAttribute('sandbox')) {
                sandboxed = true;
            }
        } catch(e) {
            sandboxed = inIframe;
        }

        log('info', `إطار: ${inIframe}, آمن: ${secure}, بروتوكول: ${protocol}`);

        return { inIframe, sandboxed, secure, protocol };
    }

    const env = detectEnv();

    // Update UI
    function updateUI() {
        const envCheck = document.getElementById('env-check');
        const warning = document.getElementById('sandbox-warning');
        const openDirect = document.getElementById('open-direct');

        openDirect.href = window.location.href;

        if (env.inIframe) {
            envCheck.innerHTML = '<span style="color:#ffa502">محدود (إطار)</span>';
            warning.style.display = 'block';
            log('warn', 'الموقع في إطار محصور - نظام التتبع لن يعمل');

            document.getElementById('gps-status').textContent = 'محظور';
            document.getElementById('gps-dot').className = 'status-dot dot-red';
        } else if (!env.secure) {
            envCheck.innerHTML = '<span style="color:#ff4757">غير آمن</span>';
            log('error', 'الاتصال غير آمن - يجب استخدام HTTPS');
        } else {
            envCheck.innerHTML = '<span style="color:#00ff88">جاهز</span>';
            log('success', 'البيئة جاهزة لنظام التتبع');
        }
    }

    updateUI();

    // Initialize map
    log('info', 'تحميل الخريطة...');
    var map = L.map('map', { zoomControl: false }).setView([21.4858, 39.1925], 14);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: '© Esri', maxZoom: 19
    }).addTo(map);

    // Regions
    var region1Coords = [
        [21.4145955, 39.7486048], [21.4156007, 39.7473108], [21.4164061, 39.7461671], 
        [21.4169883, 39.7452958], [21.4177002, 39.7444673], [21.4181726, 39.7437247], 
        [21.418648, 39.7432792], [21.4194847, 39.7425574], [21.4204084, 39.7417001], 
        [21.4217015, 39.7409179], [21.4236637, 39.7398781], [21.4251565, 39.73901], 
        [21.4272413, 39.7371919], [21.4290663, 39.7355456], [21.4298917, 39.7347561], 
        [21.4312972, 39.7333607], [21.4329423, 39.7320511], [21.4344615, 39.7309563], 
        [21.4361803, 39.7301297], [21.4364852, 39.7298954], [21.4364208, 39.7295533], 
        [21.4260972, 39.7191377], [21.4179904, 39.6956421], [21.3790397, 39.697727], 
        [21.3890136, 39.7066551], [21.3922836, 39.7095776], [21.3958851, 39.7120617], 
        [21.3993615, 39.7145938], [21.4009398, 39.7158537], [21.4018189, 39.7166262], 
        [21.4028421, 39.717227], [21.4055448, 39.7191953], [21.4084815, 39.7214698], 
        [21.4098199, 39.7232294], [21.4111848, 39.7249126], [21.4119104, 39.7279692], 
        [21.4119231, 39.7356274], [21.4118288, 39.7370606], [21.4115292, 39.7398715], 
        [21.4114226, 39.7422091], [21.4113893, 39.7435622], [21.4120179, 39.7474645], 
        [21.4126478, 39.7507721], [21.4133574, 39.7500313], [21.4145955, 39.7486048]
    ];

    var region2Coords = [
        [21.3485877, 39.7811709], [21.3519452, 39.7741328], [21.3773638, 39.764863], 
        [21.4003805, 39.7607432], [21.4040564, 39.758061], [21.4078921, 39.755765], 
        [21.4104304, 39.7531968], [21.4126478, 39.7507721], [21.4118687, 39.7466521], 
        [21.4113893, 39.7435622], [21.4115292, 39.7398715], [21.4119231, 39.7356274], 
        [21.4119104, 39.7279692], [21.4111848, 39.7249126], [21.4084815, 39.7214698], 
        [21.4028421, 39.717227], [21.4018189, 39.7166262], [21.4009398, 39.7158537], 
        [21.3993615, 39.7145938], [21.3922836, 39.7095776], [21.3790397, 39.697727], 
        [21.34424, 39.7536995], [21.3432821, 39.7353317], [21.3445597, 39.7109558], 
        [21.3420022, 39.6941327], [21.3384839, 39.6795417], [21.3327277, 39.6582557], 
        [21.3365652, 39.6390296], [21.3301692, 39.6307899], [21.3239323, 39.6368848], 
        [21.314497, 39.6414342], [21.3025027, 39.6441805], [21.2930671, 39.6513892], 
        [21.2869913, 39.6666711], [21.2863317, 39.6709415], [21.2837526, 39.6752119], 
        [21.2713953, 39.6961112], [21.2570755, 39.7165348], [21.2266757, 39.7442582], 
        [21.2249961, 39.7553303], [21.2271558, 39.7708656], [21.2437964, 39.8093179], 
        [21.2388365, 39.817043], [21.2325963, 39.8220211], [21.2256041, 39.8244015], 
        [21.2195262, 39.8260975], [21.1914133, 39.8371241], [21.1795244, 39.8458998], 
        [21.1716693, 39.8543489], [21.1685361, 39.8581197], [21.1666366, 39.8636954], 
        [21.1659375, 39.8696572], [21.1690591, 39.8792699], [21.1815836, 39.891995], 
        [21.1832231, 39.894936], [21.1872231, 39.9092075], [21.195464, 39.9135234], 
        [21.21263, 39.9092133], [21.2176335, 39.9089369], [21.2257579, 39.9143218], 
        [21.2284636, 39.9146192], [21.2395698, 39.9156889], [21.2461156, 39.9164154], 
        [21.2528215, 39.9183436], [21.2570342, 39.9223534], [21.259967, 39.9254193], 
        [21.2661523, 39.935929], [21.2890668, 39.9225284], [21.2884287, 39.914203], 
        [21.2954156, 39.9092252], [21.2991489, 39.9039895], [21.303042, 39.8994402], 
        [21.3006978, 39.8815056], [21.3121589, 39.8776597], [21.3142537, 39.8778033], 
        [21.3145493, 39.8793846], [21.31634, 39.8769039], [21.3181024, 39.8764055], 
        [21.3193883, 39.8755805], [21.3213605, 39.8741449], [21.3240856, 39.8740417], 
        [21.3266574, 39.8735992], [21.3276693, 39.8752201], [21.3276418, 39.8799309], 
        [21.3307325, 39.8794061], [21.3402966, 39.861685], [21.3535881, 39.8509606], 
        [21.3522493, 39.8478063], [21.3512301, 39.8448236], [21.3503906, 39.8378714], 
        [21.35135, 39.83417], [21.3524692, 39.8299107], [21.3545474, 39.8219069], 
        [21.3518497, 39.8129589], [21.3494912, 39.8041185], [21.3466691, 39.7906122], 
        [21.3485877, 39.7811709]
    ];

    L.polygon(region1Coords, { color: '#ff5252', fillColor: '#ff5252', fillOpacity: 0.25, weight: 3, dashArray: '8, 8' }).addTo(map).bindPopup("<b>المربع الأول</b>");
    L.polygon(region2Coords, { color: '#0F9D58', fillColor: '#0F9D58', fillOpacity: 0.25, weight: 3, dashArray: '8, 8' }).addTo(map).bindPopup("<b>المربع الثاني</b>");

    var allRegions = L.featureGroup([L.polygon(region1Coords), L.polygon(region2Coords)]);
    map.fitBounds(allRegions.getBounds().pad(0.1));

    log('success', 'الخريطة جاهزة');

    // GPS Handler
    document.getElementById('btn-start').addEventListener('click', function() {
        log('info', 'تم الضغط على زر التفعيل');

        if (env.inIframe) {
            log('error', 'نظام التتبع محظور في الإطار المحصور');
            document.getElementById('gps-status').textContent = 'محظور';
            document.getElementById('gps-dot').className = 'status-dot dot-red';

            if (confirm('🚫 نظام التتبع محظور في Google Sites\n\nهل تريد فتح الموقع في نافذة جديدة؟')) {
                window.open(window.location.href, '_blank');
            }
            return;
        }

        if (!navigator.geolocation) {
            log('error', 'المتصفح لا يدعم نظام التتبع');
            alert('❌ المتصفح لا يدعم GPS');
            return;
        }

        this.disabled = true;
        document.getElementById('gps-status').textContent = 'جاري البحث...';
        document.getElementById('gps-dot').className = 'status-dot dot-yellow';

        navigator.geolocation.getCurrentPosition(
            function(pos) {
                const acc = pos.coords.accuracy;
                log('success', `تم تحديد الموقع: ${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)} (±${Math.round(acc)}م)`);

                document.getElementById('gps-status').textContent = 'متصل';
                document.getElementById('gps-dot').className = 'status-dot dot-green';
                document.getElementById('accuracy').textContent = `±${Math.round(acc)}م`;

                map.setView([pos.coords.latitude, pos.coords.longitude], 17);

                L.circleMarker([pos.coords.latitude, pos.coords.longitude], {
                    radius: 10, color: 'white', fillColor: '#0078ff', fillOpacity: 1, weight: 3
                }).addTo(map);

                // Check zone
                checkZone([pos.coords.latitude, pos.coords.longitude]);
            },
            function(err) {
                log('error', `خطأ في التتبع: ${err.message}`);
                document.getElementById('gps-status').textContent = 'فشل';
                document.getElementById('gps-dot').className = 'status-dot dot-red';

                const msgs = {
                    1: 'تم رفض الإذن - يرجى السماح بالوصول للموقع',
                    2: 'الموقع غير متاح - تأكد من تفعيل GPS',
                    3: 'انتهت المهلة - حاول مرة أخرى'
                };
                alert('⚠️ ' + (msgs[err.code] || err.message));
            },
            { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
    });

    // Zone check
    function checkZone(latlng) {
        function isPointInPolygon(point, polygon) {
            const x = point[0], y = point[1];
            let inside = false;
            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                const xi = polygon[i][0], yi = polygon[i][1];
                const xj = polygon[j][0], yj = polygon[j][1];
                const intersect = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        const inR1 = isPointInPolygon(latlng, region1Coords);
        const inR2 = isPointInPolygon(latlng, region2Coords);

        if (inR1) {
            document.getElementById('zone-check').innerHTML = '<span style="color:#ff5252">المربع الأول</span>';
            showAlert('alert-region1');
            log('info', 'داخل المربع الأول');
        } else if (inR2) {
            document.getElementById('zone-check').innerHTML = '<span style="color:#0F9D58">المربع الثاني</span>';
            showAlert('alert-region2');
            log('info', 'داخل المربع الثاني');
        } else {
            document.getElementById('zone-check').textContent = 'خارج المناطق';
            log('info', 'خارج المناطق المحددة');
        }
    }

    function showAlert(id) {
        document.getElementById('backdrop').style.display = 'block';
        document.getElementById(id).style.display = 'block';
        if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
    }

    function closeAlert(id) {
        document.getElementById('backdrop').style.display = 'none';
        document.getElementById(id).style.display = 'none';
    }

    document.getElementById('backdrop').addEventListener('click', function() {
        closeAlert('alert-region1');
        closeAlert('alert-region2');
    });

    log('info', 'النظام جاهز');
</script>
</body>
</html>
