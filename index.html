<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <title>نظام التتبع المتقدم</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
        }

        /* Desktop mode warning for mobile users */
        #desktop-notice {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            z-index: 10000;
            text-align: center;
            font-size: 13px;
            direction: rtl;
        }
        #desktop-notice a {
            color: #ffd700;
            text-decoration: underline;
            font-weight: bold;
            margin: 0 10px;
        }

        /* Top Information Bar */
        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: 3px solid #00b894;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        #top-bar .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #00b894;
            font-size: 20px;
            font-weight: bold;
            white-space: nowrap;
        }

        #top-bar .info-section {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-size: 14px;
            background: rgba(255,255,255,0.08);
            padding: 10px 18px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.15);
            white-space: nowrap;
        }

        .info-item .label {
            color: #aaa;
            font-size: 12px;
        }

        .info-item .value {
            color: #fff;
            font-weight: bold;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        .dot-red { background: #ff4757; box-shadow: 0 0 10px #ff4757; }
        .dot-green { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .dot-yellow { background: #ffa502; box-shadow: 0 0 10px #ffa502; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #btn-start {
            background: linear-gradient(135deg, #00b894 0%, #00a085 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0,184,148,0.3);
        }
        #btn-start:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(0,184,148,0.5); 
        }
        #btn-start:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Map Container */
        #map-container {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            background: #1a1a2e;
        }

        #map { 
            height: 100% !important; 
            width: 100% !important;
            z-index: 1;
            background: #1a1a2e;
        }

        /* Alert Modal */
        #backdrop {
            display: none;
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.85); 
            z-index: 9998;
            backdrop-filter: blur(5px);
        }

        .region-alert {
            display: none;
            position: fixed; 
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 40px 50px;
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7);
            z-index: 9999;
            text-align: center;
            min-width: 350px;
            max-width: 90%;
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            color: white;
            direction: rtl;
        }

        .region-alert.active { background: linear-gradient(135deg, #00b894 0%, #00a085 100%); border: 2px solid rgba(255,255,255,0.2); }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            70% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .region-name { font-size: 36px; font-weight: bold; margin: 15px 0; display: block; }
        .close-btn { margin-top: 30px; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.6); color: white; padding: 14px 40px; border-radius: 30px; cursor: pointer; font-weight: bold; }

        #log-panel {
            position: fixed; bottom: 15px; left: 15px; background: rgba(0,0,0,0.9); color: #00ff88; padding: 15px; border-radius: 12px; font-family: monospace; font-size: 11px; max-width: 400px; max-height: 200px; overflow-y: auto; z-index: 1000; border: 1px solid #333; display: none; direction: rtl;
        }
    </style>
</head>
<body>

<div id="desktop-notice">
    📱 <strong>تنبيه:</strong> للحصول على أفضل تجربة، يرجى فتح الموقع في وضع سطح المكتب
</div>

<div id="top-bar">
    <div class="logo"><span>📍</span><span>نظام التتبع المتقدم</span></div>
    <div class="info-section">
        <div class="info-item"><span class="label">📡 حالة التتبع:</span><span class="value" id="gps-status">غير متصل</span><span class="status-dot dot-red" id="gps-dot"></span></div>
        <div class="info-item"><span class="label">🎯 المنطقة:</span><span class="value" id="zone-check">---</span></div>
        <div class="info-item"><span class="label">📊 الدقة:</span><span class="value" id="accuracy">---</span></div>
        <button id="btn-start">📡 تفعيل التتبع</button>
    </div>
</div>

<div id="backdrop"></div>
<div id="universal-alert" class="region-alert active">
    <h2>دخول منطقة محددة</h2>
    <p>أنت الآن داخل<br><span id="alert-zone-name" class="region-name">---</span></p>
    <button class="close-btn" onclick="closeAlert()">حسناً</button>
</div>

<div id="log-panel"><div id="log-content"></div></div>

<div id="map-container"><div id="map"></div></div>

<script>
    // Logging system
    function log(type, msg) {
        const div = document.createElement('div');
        div.textContent = `${new Date().toLocaleTimeString('ar-SA')} [${type}] ${msg}`;
        document.getElementById('log-content').appendChild(div);
        console.log(`[${type}] ${msg}`);
    }

    // --- إحداثيات المناطق الجديدة من ملفات KML ---
    const geoRegions = [
        {
            name: "الوردية الأولى",
            color: "#F57C00",
            coords: [[21.4205663,39.7784752],[21.4391024,39.775042],[21.4397415,39.7606225],[21.4359067,39.7571892],[21.4314325,39.7482628],[21.4298346,39.7444863],[21.4298346,39.7365899],[21.4288759,39.7247452],[21.4248809,39.7189087],[21.4218447,39.709124],[21.4180094,39.6969361],[21.4164113,39.6919579],[21.3799705,39.6969361],[21.3873233,39.7044892],[21.3932373,39.7092957],[21.4053841,39.7183938],[21.4112974,39.7240586],[21.4119366,39.7374482],[21.4114572,39.7444863],[21.4101787,39.7530694],[21.4135348,39.7544426],[21.4143338,39.7630257],[21.4146534,39.7678322],[21.416731,39.774012],[21.4205663,39.7784752]]
        },
        {
            name: "مضلع 1",
            color: "#FBC02D",
            coords: [[21.349931,39.8036451],[21.3467333,39.7954053],[21.349931,39.7802991],[21.3448147,39.7658796],[21.3422565,39.7445936],[21.3422565,39.730174],[21.3435356,39.7116346],[21.3416169,39.6985883],[21.3396982,39.687602],[21.3358608,39.6711225],[21.3320232,39.6628827],[21.3320232,39.654643],[21.3365003,39.6381635],[21.3320232,39.6292371],[21.3173116,39.6402234],[21.2981204,39.6484632],[21.2898034,39.6580762],[21.2866044,39.6697492],[21.2795664,39.6834821],[21.2578106,39.7171277],[21.2334914,39.7377271],[21.2232506,39.75146],[21.2290112,39.774806],[21.2405316,39.8002118],[21.2430916,39.8098249],[21.2430916,39.8228711],[21.2616501,39.8283643],[21.2782868,39.8256177],[21.3013191,39.8180646],[21.3262667,39.8105115],[21.349931,39.8036451]]
        },
        {
            name: "مضلع 11",
            color: "#817717",
            coords: [[21.3534549,39.8504782],[21.350737,39.8424959],[21.3504973,39.8377752],[21.3512167,39.8328829],[21.3539827,39.8240503],[21.3539266,39.8209214],[21.353231,39.8179642],[21.3496484,39.8044189],[21.3420233,39.8052454],[21.3282721,39.8096228],[21.2968475,39.8193216],[21.2682957,39.8261023],[21.2439782,39.8261023],[21.2279777,39.8254156],[21.2242974,39.8250723],[21.2133358,39.8288489],[21.19109,39.8378611],[21.1795657,39.8458433],[21.1694812,39.8570872],[21.1669199,39.8638678],[21.1669999,39.8734808],[21.1694812,39.878974],[21.1758841,39.8849821],[21.1839674,39.893136],[21.1852479,39.8983717],[21.1858881,39.9043799],[21.188369,39.9092722],[21.1935708,39.9125338],[21.1978121,39.9133063],[21.2018132,39.9121905],[21.2082147,39.9101305],[21.2122155,39.9086714],[21.2140865,39.9083598],[21.2181366,39.9094439],[21.221257,39.9116755],[21.2237373,39.9132204],[21.2276577,39.9139929],[21.2326981,39.9147654],[21.2380583,39.9151945],[21.2441382,39.9156237],[21.2474981,39.9163103],[21.2534977,39.9190569],[21.2573373,39.9219752],[21.2659761,39.9342489],[21.2665666,39.935139],[21.2684862,39.9349673],[21.271495,39.9334765],[21.2766139,39.9306441],[21.286851,39.9239493],[21.2885305,39.9222326],[21.2888504,39.9199152],[21.2877307,39.916997],[21.2873615,39.9150546],[21.2896007,39.9124797],[21.2925291,39.9109888],[21.2942391,39.9102481],[21.2969275,39.9060965],[21.3028357,39.8993476],[21.2999969,39.8793491],[21.3134309,39.8774608],[21.3145103,39.8793061],[21.3158297,39.8769887],[21.3163094,39.8760017],[21.3251846,39.8737271],[21.326224,39.8757013],[21.3251004,39.8751004],[21.3273433,39.8787912],[21.3303815,39.8787053],[21.3408547,39.8614534],[21.3534549,39.8504782]]
        },
        {
            name: "الوردية الرابعة معدل",
            color: "#007cf5",
            coords: [[21.3768231,39.6915736],[21.3429272,39.7071064],[21.3434134,39.7106172],[21.3435298,39.7114535],[21.3434756,39.7128731],[21.3425379,39.7263627],[21.3424377,39.7341783],[21.3425794,39.7417194],[21.3427933,39.7456146],[21.3430165,39.7476955],[21.3437566,39.7526972],[21.3439753,39.7561032],[21.3443700,39.7608616],[21.3452364,39.7668436],[21.3455672,39.7677304],[21.3477767,39.7736598],[21.3494679,39.7755813],[21.3545090,39.7738075],[21.3741795,39.7658747],[21.3798482,39.7645530],[21.3942631,39.7620645],[21.3996377,39.7611926],[21.4036783,39.7587149],[21.4094647,39.7547994],[21.4101935,39.7517526],[21.4114849,39.7433814],[21.4117082,39.7392697],[21.4117093,39.7353041],[21.4116063,39.7340390],[21.4115296,39.7317470],[21.4114596,39.7305534],[21.4113608,39.7279882],[21.4112776,39.7257227],[21.4112293,39.7244106],[21.4112254,39.7240175],[21.3849936,39.7023201],[21.3798798,39.6968708],[21.3768231,39.6915736]]
        }
    ];

    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([21.4, 39.7], 12);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    // إضافة المضلعات للخريطة
    geoRegions.forEach(region => {
        L.polygon(region.coords, { color: region.color, fillOpacity: 0.25 }).addTo(map).bindPopup(region.name);
    });

    document.getElementById('btn-start').addEventListener('click', function() {
        if (!navigator.geolocation) return alert('GPS غير مدعوم');
        this.disabled = true;
        document.getElementById('gps-status').textContent = 'جاري التتبع...';
        
        navigator.geolocation.watchPosition(function(pos) {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            document.getElementById('gps-status').textContent = 'متصل';
            document.getElementById('gps-dot').className = 'status-dot dot-green';
            document.getElementById('accuracy').textContent = `±${Math.round(pos.coords.accuracy)}م`;
            
            map.setView([lat, lng], 15);
            checkZone(lat, lng);
        }, null, { enableHighAccuracy: true });
    });

    function isPointInPoly(lat, lng, poly) {
        var x = lat, y = lng;
        var inside = false;
        for (var i = 0, j = poly.length - 1; i < poly.length; j = i++) {
            var xi = poly[i][0], yi = poly[i][1];
            var xj = poly[j][0], yj = poly[j][1];
            var intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
            if (intersect) inside = !inside;
        }
        return inside;
    }

    function checkZone(lat, lng) {
        let found = false;
        geoRegions.forEach(region => {
            if (isPointInPoly(lat, lng, region.coords)) {
                document.getElementById('zone-check').textContent = region.name;
                document.getElementById('zone-check').style.color = region.color;
                showAlert(region.name);
                found = true;
            }
        });
        if (!found) document.getElementById('zone-check').textContent = 'خارج المناطق';
    }

    function showAlert(name) {
        document.getElementById('alert-zone-name').textContent = name;
        document.getElementById('backdrop').style.display = 'block';
        document.getElementById('universal-alert').style.display = 'block';
    }

    function closeAlert() {
        document.getElementById('backdrop').style.display = 'none';
        document.getElementById('universal-alert').style.display = 'none';
    }
</script>
</body>
</html>
